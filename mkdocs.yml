site_name: NEXUS Core
site_description: Many LLMs talk and reason together — durable multi-agent start console
site_url: https://vincentmarquez.github.io/nexus-core/
repo_url: https://github.com/VincentMarquez/nexus-core
repo_name: VincentMarquez/nexus-core
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - toc.integrate
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

nav:
  - Start: index.md
  - Get started:
      - Install & demo: getting-started.md
      - Demo guide: DEMO.md
      - Cookbooks: cookbooks.md
      - Crash → resume: cookbook/01_crash_resume.md
      - Judge vs presence: cookbook/02_judge_vs_presence.md
      - Local LLM (Ollama): cookbook/03_local_llm_ollama.md
      - Workspace MCP: cookbook/04_workspace_mcp.md
      - GLM-5.2 / colibrì: cookbook/05_glm52_colibri.md
      - GitHub URL → fix: cookbook/06_github_do.md
      - Procurement agents: cookbook/07_procurement.md
      - arXiv research: cookbook/08_arxiv_research.md
      - GitHub community auto-reply: cookbook/09_github_community.md
      - Platforms + local LLM: cookbook/10_platforms_local_llm.md
      - Heartbeat + resilience: cookbook/11_heartbeat_resilience.md
      - GitHub community (full): GITHUB_COMMUNITY.md
      - PyPI publish: PYPI.md
  - Architecture:
      - Overview: ARCHITECTURE.md
      - Pipeline: PIPELINE.md
      - Memory: MEMORY.md
      - Cascade: CASCADE.md
      - Figures: FIGURES.md
      - Compare: COMPARE.md
      - Roadmap: ROADMAP.md
  - Domains:
      - Procurement agent: agents/PROCUREMENT.md
      - arXiv research agent: agents/RESEARCH_ARXIV.md
  - Connect:
      - Connectors & MCP: CONNECTORS.md
      - MCP setup: MCP_SETUP.md
      - Platforms + local LLM: PLATFORMS.md
      - Resilience (power/WiFi): RESILIENCE.md
      - Repo mine (use, not follow): REPO_MINE.md
      - Schedule ChatGPT/Claude: SCHEDULE_AGENTS.md
      - Bridges: BRIDGES_AND_BUS.md
      - GLM-5.2: GLM52.md
  - Launch:
      - Show HN: SHOW_HN.md
      - Social posts: SOCIAL_POSTS.md
      - Growth research: GROWTH.md
      - Video script: VIDEO_SCRIPT.md
      - Launch checklist: LAUNCH_CHECKLIST.md

plugins:
  - search

extra_css:
  - stylesheets/nexus.css

extra_javascript:
  - javascripts/console.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/VincentMarquez/nexus-core
