name: Publish to PyPI

# Requires one-time Trusted Publisher on pypi.org for project nexus-multi-agent:
#   owner=VincentMarquez  repo=nexus-core  workflow=publish.yml  environment=pypi
# See docs/PYPI.md

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # trusted publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install -U build twine
          python -m build
          twine check dist/*
      - name: Publish (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
