# Automatic first replies on issues & PRs (NEXUS community one-stop shop).
# Marker <!-- nexus-community-bot --> prevents double-posts.
#
# Local mirror (same drafts, your gh token):
#   nexus github inbox
#   nexus github auto --dry-run
#   nexus github reply 12
#
# Docs: docs/GITHUB_COMMUNITY.md

name: Community bot

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      number:
        description: "Issue/PR number to reply to (optional; empty = skip)"
        required: false
        default: ""

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  reply:
    runs-on: ubuntu-latest
    # Skip bot-authored events to avoid loops
    if: >
      github.event.sender.type != 'Bot' &&
      (
        github.event_name != 'issue_comment' ||
        contains(github.event.comment.body, '@nexus') ||
        contains(github.event.comment.body, '/nexus') ||
        contains(github.event.comment.body, '/triage') ||
        contains(github.event.comment.body, 'nexus-bot')
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install -U pip
          pip install -e .

      - name: Install gh
        run: |
          # gh is preinstalled on ubuntu-latest; ensure present
          gh --version

      - name: Auto-reply from event
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python -m nexus.github_community --event "$GITHUB_EVENT_PATH"

      - name: Manual reply (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          nexus github reply "${{ inputs.number }}" --repo "$GITHUB_REPOSITORY"
