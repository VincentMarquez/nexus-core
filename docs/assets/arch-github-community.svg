<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-label="NEXUS GitHub community ML architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="ml" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="loop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
    <filter id="s" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrP" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="1200" height="780" fill="url(#bg)"/>

  <text x="40" y="40" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="800" fill="#0f172a">GitHub community — ML architecture</text>
  <text x="40" y="66" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#64748b">Event in → route → (heuristic | multi-LLM draft) → evidence loop (tests) → write-back → next response</text>

  <!-- Layer labels -->
  <text x="40" y="100" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="1">① SENSORS</text>
  <text x="320" y="100" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#7c3aed" letter-spacing="1">② ROUTER / POLICY</text>
  <text x="640" y="100" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#0e7490" letter-spacing="1">③ MODEL LAYER (optional)</text>
  <text x="960" y="100" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#166534" letter-spacing="1">④ ACTUATORS</text>

  <!-- ① Sensors -->
  <rect x="30" y="115" width="250" height="200" rx="14" fill="#fff" stroke="#c7d2fe" filter="url(#s)"/>
  <text x="155" y="145" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#312e81">GitHub events</text>
  <rect x="48" y="160" width="214" height="32" rx="8" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="155" y="181" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#312e81">issues · opened / reopened</text>
  <rect x="48" y="200" width="214" height="32" rx="8" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="155" y="221" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#312e81">pull_request · sync / open</text>
  <rect x="48" y="240" width="214" height="32" rx="8" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="155" y="261" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#312e81">issue_comment · human text</text>
  <text x="155" y="298" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#64748b">Actions + gh CLI sensors</text>

  <!-- arrow 1→2 -->
  <path d="M280 215 H310" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ② Router -->
  <rect x="310" y="115" width="280" height="200" rx="14" fill="#fff" stroke="#ddd6fe" filter="url(#s)"/>
  <text x="450" y="145" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#5b21b6">Community controller</text>
  <text x="450" y="168" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#64748b">github_community.py · CLI · workflow</text>
  <rect x="328" y="185" width="244" height="28" rx="7" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="450" y="204" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#5b21b6">intent: first-reply | loop | skip</text>
  <rect x="328" y="222" width="244" height="28" rx="7" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="450" y="241" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#5b21b6">dedupe: bot + loop sha markers</text>
  <rect x="328" y="259" width="244" height="28" rx="7" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="450" y="278" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#5b21b6">labels → draft policy (bug/PR/…)</text>

  <!-- arrow 2→3 -->
  <path d="M590 185 H630" stroke="#6366f1" stroke-width="2" marker-end="url(#arrP)"/>
  <path d="M590 250 H630" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ③ Model layer -->
  <rect x="630" y="115" width="300" height="200" rx="14" fill="url(#ml)" filter="url(#s)"/>
  <text x="780" y="145" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#e0e7ff">Multi-LLM panel (optional)</text>
  <text x="780" y="168" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#a5f3fc">nexus bus · --llm drafts</text>
  <rect x="650" y="185" width="120" height="48" rx="8" fill="#1e1b4b" stroke="#a5b4fc"/>
  <text x="710" y="205" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#c7d2fe">Claude</text>
  <text x="710" y="222" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#94a3b8">triage tone</text>
  <rect x="790" y="185" width="120" height="48" rx="8" fill="#052e1c" stroke="#34d399"/>
  <text x="850" y="205" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#6ee7b7">Codex/GPT</text>
  <text x="850" y="222" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#94a3b8">fix hints</text>
  <rect x="650" y="245" width="120" height="48" rx="8" fill="#0c1929" stroke="#60a5fa"/>
  <text x="710" y="265" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#93c5fd">Grok / local</text>
  <text x="710" y="282" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#94a3b8">adversary</text>
  <rect x="790" y="245" width="120" height="48" rx="8" fill="#14532d" stroke="#4ade80"/>
  <text x="850" y="265" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#86efac">Heuristic</text>
  <text x="850" y="282" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#bbf7d0">default path</text>

  <!-- arrow 3→4 -->
  <path d="M930 215 H955" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ④ Actuators -->
  <rect x="955" y="115" width="215" height="200" rx="14" fill="#fff" stroke="#86efac" filter="url(#s)"/>
  <text x="1062" y="145" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#166534">Write-back</text>
  <rect x="973" y="165" width="180" height="36" rx="8" fill="#ecfdf5" stroke="#34d399"/>
  <text x="1062" y="188" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#065f46">issue / PR comment</text>
  <rect x="973" y="215" width="180" height="36" rx="8" fill="#ecfdf5" stroke="#34d399"/>
  <text x="1062" y="238" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#065f46">PASS / FAIL report</text>
  <rect x="973" y="265" width="180" height="28" rx="8" fill="#f0fdf4" stroke="#86efac"/>
  <text x="1062" y="284" text-anchor="middle" font-family="ui-monospace,monospace" font-size="10" fill="#166534">sha markers · no merge</text>

  <!-- Evidence / ground-truth loop (ML core) -->
  <text x="40" y="355" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#166534" letter-spacing="1">⑤ EVIDENCE LOOP — ground truth (not model vibes)</text>
  <rect x="30" y="370" width="1140" height="175" rx="16" fill="url(#loop)" filter="url(#s)"/>

  <rect x="55" y="400" width="180" height="110" rx="12" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="145" y="440" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#bbf7d0">Checkout</text>
  <text x="145" y="465" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#86efac">PR head or main</text>
  <text x="145" y="488" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#4ade80">git sha</text>

  <path d="M235 455 H265" stroke="#4ade80" stroke-width="2" marker-end="url(#arrG)"/>

  <rect x="265" y="400" width="180" height="110" rx="12" fill="#052e16" stroke="#4ade80" stroke-width="1.5"/>
  <text x="355" y="440" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#bbf7d0">Install</text>
  <text x="355" y="465" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#86efac">pip install -e .[dev]</text>
  <text x="355" y="488" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#4ade80">venv-safe</text>

  <path d="M445 455 H475" stroke="#4ade80" stroke-width="2" marker-end="url(#arrG)"/>

  <rect x="475" y="400" width="180" height="110" rx="12" fill="#052e16" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="565" y="440" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#fde68a">Pytest</text>
  <text x="565" y="465" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#fef3c7">unit suite</text>
  <text x="565" y="488" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#fbbf24">evidence A</text>

  <path d="M655 455 H685" stroke="#4ade80" stroke-width="2" marker-end="url(#arrG)"/>

  <rect x="685" y="400" width="180" height="110" rx="12" fill="#052e16" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="775" y="440" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#fde68a">Smoke evals</text>
  <text x="775" y="465" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#fef3c7">resume · judge gates</text>
  <text x="775" y="488" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#fbbf24">evidence B</text>

  <path d="M865 455 H895" stroke="#4ade80" stroke-width="2" marker-end="url(#arrG)"/>

  <rect x="895" y="400" width="250" height="110" rx="12" fill="#022c22" stroke="#34d399" stroke-width="2"/>
  <text x="1020" y="435" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#6ee7b7">Score + publish</text>
  <text x="1020" y="460" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#a7f3d0">PASS/FAIL table + log tails</text>
  <text x="1020" y="485" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="#34d399">loop marker sha=…</text>

  <!-- Continuous loop feedback -->
  <text x="40" y="585" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#b45309" letter-spacing="1">⑥ CONTINUOUS CONTROL LOOP</text>
  <rect x="30" y="600" width="1140" height="140" rx="14" fill="#fff" stroke="#fcd34d" filter="url(#s)"/>

  <!-- cycle boxes -->
  <rect x="60" y="630" width="150" height="70" rx="10" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="135" y="660" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#92400e">Human response</text>
  <text x="135" y="682" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#a16207">comment / push</text>

  <path d="M210 665 H245" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="245" y="630" width="150" height="70" rx="10" fill="#eef2ff" stroke="#6366f1"/>
  <text x="320" y="660" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#3730a3">Ingest + route</text>
  <text x="320" y="682" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#4f46e5">skip bots /noloop</text>

  <path d="M395 665 H430" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="430" y="630" width="150" height="70" rx="10" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="505" y="660" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#0e7490">Reason (opt LLM)</text>
  <text x="505" y="682" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#0891b2">or heuristic draft</text>

  <path d="M580 665 H615" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="615" y="630" width="150" height="70" rx="10" fill="#ecfdf5" stroke="#16a34a"/>
  <text x="690" y="660" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#166534">Measure tests</text>
  <text x="690" y="682" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#15803d">pytest + smoke</text>

  <path d="M765 665 H800" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="800" y="630" width="150" height="70" rx="10" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="875" y="660" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#166534">Actuate</text>
  <text x="875" y="682" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#15803d">post results</text>

  <path d="M950 665 H985" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="985" y="630" width="155" height="70" rx="10" fill="#fef3c7" stroke="#d97706"/>
  <text x="1062" y="660" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="700" fill="#92400e">Wait / memory</text>
  <text x="1062" y="682" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#a16207">sha dedupe</text>

  <!-- feedback arc note -->
  <path d="M1062 700 Q 620 760 135 700" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arr)"/>
  <text x="600" y="755" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" font-weight="600" fill="#b45309">next human reply or PR commit restarts the loop</text>
</svg>
