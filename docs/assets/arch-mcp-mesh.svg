<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" role="img" aria-label="MCP connector mesh architecture">
  <defs>
    <filter id="s2" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1100" height="640" fill="#fafafa"/>
  <text x="40" y="40" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#0f172a">MCP Connector Mesh</text>
  <text x="40" y="66" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#64748b">How AI apps and devices attach to a NEXUS-style machine (URLs &amp; keys stay private)</text>

  <!-- Clients -->
  <text x="40" y="105" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.06em">AI APPLICATIONS</text>

  <rect x="40" y="120" width="140" height="64" rx="12" fill="#10a37f" filter="url(#s2)"/>
  <text x="110" y="150" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">ChatGPT</text>
  <text x="110" y="170" text-anchor="middle" fill="#d1fae5" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">Custom MCP</text>

  <rect x="200" y="120" width="140" height="64" rx="12" fill="#18181b" filter="url(#s2)"/>
  <text x="270" y="150" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">Grok</text>
  <text x="270" y="170" text-anchor="middle" fill="#a1a1aa" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">Connectors</text>

  <rect x="360" y="120" width="140" height="64" rx="12" fill="#d97706" filter="url(#s2)"/>
  <text x="430" y="150" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">Claude</text>
  <text x="430" y="170" text-anchor="middle" fill="#ffedd5" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">Web · Desktop</text>

  <rect x="520" y="120" width="140" height="64" rx="12" fill="#4285f4" filter="url(#s2)"/>
  <text x="590" y="150" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">Gemini</text>
  <text x="590" y="170" text-anchor="middle" fill="#dbeafe" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">CLI · API</text>

  <rect x="680" y="120" width="160" height="64" rx="12" fill="#6d28d9" filter="url(#s2)"/>
  <text x="760" y="150" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700">Other MCP clients</text>
  <text x="760" y="170" text-anchor="middle" fill="#ede9fe" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">IDEs · agents</text>

  <rect x="860" y="120" width="200" height="64" rx="12" fill="#fff" stroke="#c4b5fd" filter="url(#s2)"/>
  <text x="960" y="150" text-anchor="middle" fill="#5b21b6" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700">Phone (optional)</text>
  <text x="960" y="170" text-anchor="middle" fill="#7c3aed" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">Personal memory MCP</text>

  <!-- transport labels -->
  <text x="200" y="220" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#64748b">HTTPS + SSE</text>
  <text x="430" y="220" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#64748b">stdio  or  HTTPS</text>
  <text x="960" y="220" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#64748b">tunnel · fail-open</text>

  <path d="M110 184 V250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M270 184 V250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M430 184 V250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M590 184 V250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M760 184 V250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M960 184 V280" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ar)"/>

  <!-- Edge -->
  <rect x="80" y="255" width="700" height="70" rx="14" fill="#0f172a" filter="url(#s2)"/>
  <text x="430" y="285" text-anchor="middle" fill="#e2e8f0" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">Secure edge · Tailscale / Cloudflare Tunnel / reverse proxy</text>
  <text x="430" y="308" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Your hostname &amp; auth — never committed to git</text>

  <path d="M430 325 V360" stroke="#64748b" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Machine -->
  <rect x="80" y="365" width="700" height="160" rx="16" fill="#ecfdf5" stroke="#34d399" filter="url(#s2)"/>
  <text x="430" y="400" text-anchor="middle" fill="#065f46" font-family="Georgia, serif" font-size="18">Your machine · NEXUS host</text>
  <text x="430" y="428" text-anchor="middle" fill="#047857" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Workspace MCP · Machine MCP · Event bus · Durable engine · Project jail</text>

  <rect x="120" y="450" width="140" height="50" rx="8" fill="#fff" stroke="#86efac"/>
  <text x="190" y="480" text-anchor="middle" fill="#166534" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="600">files / chat tools</text>

  <rect x="290" y="450" width="140" height="50" rx="8" fill="#fff" stroke="#86efac"/>
  <text x="360" y="480" text-anchor="middle" fill="#166534" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="600">exec daemon</text>

  <rect x="460" y="450" width="140" height="50" rx="8" fill="#fff" stroke="#86efac"/>
  <text x="530" y="480" text-anchor="middle" fill="#166534" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="600">bus :PORT</text>

  <rect x="630" y="450" width="120" height="50" rx="8" fill="#fff" stroke="#86efac"/>
  <text x="690" y="480" text-anchor="middle" fill="#166534" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="600">dashboard</text>

  <!-- Phone side box -->
  <rect x="820" y="300" width="240" height="225" rx="16" fill="#f5f3ff" stroke="#a78bfa" filter="url(#s2)"/>
  <text x="940" y="340" text-anchor="middle" fill="#5b21b6" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">Phone MCP</text>
  <text x="940" y="368" text-anchor="middle" fill="#6d28d9" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Personal memory</text>
  <text x="940" y="390" text-anchor="middle" fill="#6d28d9" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">Profile / notes</text>
  <text x="940" y="430" text-anchor="middle" fill="#7c3aed" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Best-effort</text>
  <text x="940" y="452" text-anchor="middle" fill="#7c3aed" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Offline → empty</text>
  <text x="940" y="474" text-anchor="middle" fill="#7c3aed" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">Never block tasks</text>
  <text x="940" y="500" text-anchor="middle" fill="#a78bfa" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">fail-open</text>

  <!-- bottom principles -->
  <rect x="80" y="555" width="980" height="50" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="100" y="585" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#334155">Principles: project path jail · distinct agent labels (chatgpt_web, grok_web, …) · no secrets in git · tools only when connector enabled</text>

  <text x="40" y="625" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8">Figure · MCP mesh · NEXUS Core · see docs/CONNECTORS.md</text>
</svg>
