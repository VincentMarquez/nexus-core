<svg xmlns="http://www.w3.org/2000/svg" width="920" height="280" viewBox="0 0 920 280" role="img" aria-label="NEXUS Core crash and resume demo">
  <rect width="920" height="280" fill="#0f1115"/>
  <text x="24" y="36" fill="#e8eaed" font-family="ui-sans-serif,system-ui,sans-serif" font-size="18" font-weight="700">NEXUS Core — crash → resume</text>
  <text x="24" y="58" fill="#9aa0a6" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13">Multi-agent task that survives kill -9</text>

  <!-- boxes -->
  <rect x="24" y="90" width="160" height="70" rx="10" fill="#1a1d24" stroke="#3c4048"/>
  <text x="104" y="120" text-anchor="middle" fill="#8ab4f8" font-family="ui-monospace,monospace" font-size="13">steps 1–3</text>
  <text x="104" y="142" text-anchor="middle" fill="#9aa0a6" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">checkpoint</text>

  <path d="M194 125 H230" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="240" y="90" width="160" height="70" rx="10" fill="#3b1515" stroke="#f28b82"/>
  <text x="320" y="120" text-anchor="middle" fill="#f28b82" font-family="ui-monospace,monospace" font-size="13">kill -9</text>
  <text x="320" y="142" text-anchor="middle" fill="#f5a8a8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">process dies</text>

  <path d="M410 125 H446" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="456" y="90" width="180" height="70" rx="10" fill="#1a1d24" stroke="#3c4048"/>
  <text x="546" y="120" text-anchor="middle" fill="#f0d77d" font-family="ui-monospace,monospace" font-size="13">state on disk</text>
  <text x="546" y="142" text-anchor="middle" fill="#9aa0a6" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">.nexus_state/tasks</text>

  <path d="M646 125 H682" stroke="#5f6368" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="692" y="90" width="200" height="70" rx="10" fill="#0d3b2e" stroke="#7ddea5"/>
  <text x="792" y="120" text-anchor="middle" fill="#7ddea5" font-family="ui-monospace,monospace" font-size="13">resume → 10/10</text>
  <text x="792" y="142" text-anchor="middle" fill="#a8e6c5" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">completed</text>

  <!-- judge row -->
  <rect x="24" y="190" width="868" height="64" rx="10" fill="#1a1d24" stroke="#3c4048"/>
  <text x="44" y="218" fill="#e8eaed" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="600">Rubric judge</text>
  <text x="44" y="238" fill="#9aa0a6" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13">scores success_criteria + artifact evidence — not “the agent returned JSON”</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5f6368"/>
    </marker>
  </defs>
</svg>
