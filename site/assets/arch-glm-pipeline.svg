  <rect x="40" y="420" width="1020" height="90" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#s3)"/>
  <text x="60" y="455" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Example mapping</text>
  <text x="60" y="480" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#475569">planner/implementer/reviewer → glm52 or Claude · adversary/tester/logger → Ollama · approve → human</text>
  <text x="60" y="500" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#64748b">Orchestration on NEXUS · MoE inference on colibrì · cloud for critique when wanted</text>

  <text x="40" y="540" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8">Figure · GLM-5.2 integration · docs/GLM52.md · github.com/VincentMarquez/nexus-core</text>
