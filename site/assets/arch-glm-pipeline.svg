  </defs>
  <rect width="1100" height="560" fill="#f8fafc"/>
  <text x="40" y="40" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#0f172a">Heavy Local MoE + Light Agents</text>
  <text x="40" y="66" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#64748b">GLM-5.2 (colibrì) as a first-class NEXUS agent alongside cloud CLIs and Ollama</text>

  <!-- left: cloud/small -->
  <rect x="40" y="100" width="300" height="280" rx="16" fill="#fff" stroke="#e2e8f0" filter="url(#s3)"/>
  <text x="190" y="140" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" fill="#0f172a">Fast / subscription layer</text>
  <rect x="70" y="165" width="240" height="40" rx="8" fill="#10a37f"/>
  <text x="190" y="190" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13">ChatGPT · Codex</text>
  <rect x="70" y="220" width="240" height="40" rx="8" fill="#d97706"/>
  <text x="190" y="245" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13">Claude CLI / Desktop</text>
  <rect x="70" y="275" width="240" height="40" rx="8" fill="#18181b"/>
  <text x="190" y="300" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13">Grok</text>
  <rect x="70" y="330" width="240" height="40" rx="8" fill="#0f766e"/>
  <text x="190" y="355" text-anchor="middle" fill="#fff" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13">Ollama (small/fast)</text>

