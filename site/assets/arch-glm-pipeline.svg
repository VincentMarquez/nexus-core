  <text x="910" y="260" text-anchor="middle" fill="#ddd6fe" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">coli serve · OpenAI-compatible</text>
  <text x="910" y="285" text-anchor="middle" fill="#ddd6fe" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">agent slot: glm52</text>
