  <rect x="400" y="160" width="300" height="160" rx="16" fill="#1e293b" filter="url(#s3)"/>
  <text x="550" y="210" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16" font-weight="700">NEXUS Event Bus</text>
  <text x="550" y="240" text-anchor="middle" fill="#cbd5e1" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">role map · health · circuits</text>
  <text x="550" y="265" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12">durable engine + judge</text>
  <text x="550" y="290" text-anchor="middle" fill="#64748b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">dashboard · SSE</text>

  <path d="M340 240 H400" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar2)"/>
  <path d="M700 240 H760" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar2)"/>

  <!-- right: GLM -->
  <rect x="760" y="100" width="300" height="280" rx="16" fill="#4c1d95" filter="url(#s3)"/>
  <text x="910" y="150" text-anchor="middle" fill="#ede9fe" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700">Heavy local MoE</text>
