<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="320" viewBox="0 0 1100 320" role="img" aria-label="Ten step adversarial pipeline">
  <rect width="1100" height="320" fill="#0b1220"/>
  <text x="40" y="40" font-family="Georgia, serif" font-size="22" fill="#f8fafc">10-Step Adversarial Pipeline</text>
  <text x="40" y="66" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#94a3b8">Each step checkpoints · resume after interrupt · judge on implement/test</text>

  <!-- steps as connected chips -->
  <g font-family="ui-sans-serif,system-ui,sans-serif" font-size="10">
    <!-- row 1: 1-5 -->
    <rect x="30" y="100" width="180" height="56" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="120" y="125" text-anchor="middle" fill="#38bdf8" font-weight="700">1 goal</text>
    <text x="120" y="142" text-anchor="middle" fill="#94a3b8">criteria</text>

    <path d="M210 128 H230" stroke="#475569" stroke-width="2"/>
    <rect x="230" y="100" width="180" height="56" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="320" y="125" text-anchor="middle" fill="#a78bfa" font-weight="700">2 plan</text>
    <text x="320" y="142" text-anchor="middle" fill="#94a3b8">architect</text>

    <path d="M410 128 H430" stroke="#475569" stroke-width="2"/>
    <rect x="430" y="100" width="180" height="56" rx="10" fill="#1e293b" stroke="#f59e0b"/>
    <text x="520" y="125" text-anchor="middle" fill="#fbbf24" font-weight="700">3 challenge</text>
    <text x="520" y="142" text-anchor="middle" fill="#94a3b8">adversary</text>

    <path d="M610 128 H630" stroke="#475569" stroke-width="2"/>
    <rect x="630" y="100" width="180" height="56" rx="10" fill="#1e293b" stroke="#34d399"/>
    <text x="720" y="125" text-anchor="middle" fill="#34d399" font-weight="700">4 implement</text>
    <text x="720" y="142" text-anchor="middle" fill="#94a3b8">artifacts</text>

    <path d="M810 128 H830" stroke="#475569" stroke-width="2"/>
    <rect x="830" y="100" width="180" height="56" rx="10" fill="#1e293b" stroke="#34d399"/>
    <text x="920" y="125" text-anchor="middle" fill="#6ee7b7" font-weight="700">5 test</text>
    <text x="920" y="142" text-anchor="middle" fill="#94a3b8">evidence</text>

    <!-- row 2 -->
    <rect x="30" y="190" width="180" height="56" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="120" y="215" text-anchor="middle" fill="#c4b5fd" font-weight="700">6 review</text>
    <text x="120" y="232" text-anchor="middle" fill="#94a3b8">findings</text>

    <path d="M210 218 H230" stroke="#475569" stroke-width="2"/>
    <rect x="230" y="190" width="180" height="56" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="320" y="215" text-anchor="middle" fill="#94a3b8" font-weight="700">7 log</text>
    <text x="320" y="232" text-anchor="middle" fill="#64748b">snapshot</text>

    <path d="M410 218 H430" stroke="#475569" stroke-width="2"/>
    <rect x="430" y="190" width="180" height="56" rx="10" fill="#1e293b" stroke="#334155"/>
    <text x="520" y="215" text-anchor="middle" fill="#93c5fd" font-weight="700">8 meta</text>
    <text x="520" y="232" text-anchor="middle" fill="#94a3b8">panel</text>

    <path d="M610 218 H630" stroke="#475569" stroke-width="2"/>
    <rect x="630" y="190" width="180" height="56" rx="10" fill="#422006" stroke="#f59e0b"/>
    <text x="720" y="215" text-anchor="middle" fill="#fbbf24" font-weight="700">9 approve</text>
    <text x="720" y="232" text-anchor="middle" fill="#fcd34d">HUMAN</text>

    <path d="M810 218 H830" stroke="#475569" stroke-width="2"/>
    <rect x="830" y="190" width="180" height="56" rx="10" fill="#052e16" stroke="#22c55e"/>
    <text x="920" y="215" text-anchor="middle" fill="#4ade80" font-weight="700">10 deliver</text>
    <text x="920" y="232" text-anchor="middle" fill="#86efac">handoff</text>
  </g>

  <text x="40" y="290" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#64748b">Checkpoint after every step · kill/resume safe · judge hard-fails bad implement/test</text>
</svg>
