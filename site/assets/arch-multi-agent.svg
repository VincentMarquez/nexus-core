<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="780" viewBox="0 0 1100 780" role="img" aria-label="Multi-agent research panel architecture">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.14"/>
    </filter>
    <marker id="a1" markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1100" height="780" fill="url(#paper)"/>

  <text x="40" y="40" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#0f172a">Multi-Agent Research Panel</text>
  <text x="40" y="66" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#64748b">Adversarial pipeline with heterogeneous model vendors — cloud subscriptions + local silicon</text>

  <!-- title bar agents -->
  <text x="40" y="105" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="0.08em" fill="#94a3b8">MODEL PROVIDERS (EXAMPLES)</text>

  <!-- Agent cards row 1 -->
  <!-- ChatGPT -->
  <rect x="40" y="120" width="150" height="88" rx="14" fill="#10a37f" filter="url(#sh)"/>
  <text x="115" y="158" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" fill="#fff">ChatGPT</text>
  <text x="115" y="180" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#d1fae5">OpenAI · web / API</text>
  <text x="115" y="198" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#ecfdf5">MCP connector</text>

  <!-- Codex -->
  <rect x="210" y="120" width="150" height="88" rx="14" fill="#0d9373" filter="url(#sh)"/>
  <text x="285" y="158" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" fill="#fff">Codex / GPT CLI</text>
  <text x="285" y="180" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#d1fae5">code agent</text>
  <text x="285" y="198" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#ecfdf5">CLI bridge</text>

  <!-- Claude -->
  <rect x="380" y="120" width="150" height="88" rx="14" fill="#d97706" filter="url(#sh)"/>
  <text x="455" y="158" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" fill="#fff">Claude</text>
  <text x="455" y="180" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#ffedd5">Anthropic</text>
  <text x="455" y="198" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#fff7ed">CLI · Desktop MCP</text>

  <!-- Grok -->
  <rect x="550" y="120" width="150" height="88" rx="14" fill="#18181b" filter="url(#sh)"/>
  <text x="625" y="158" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" fill="#fff">Grok</text>
  <text x="625" y="180" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#d4d4d8">xAI</text>
  <text x="625" y="198" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#a1a1aa">MCP connector</text>

  <!-- Gemini -->
  <rect x="720" y="120" width="150" height="88" rx="14" fill="#4285f4" filter="url(#sh)"/>
  <text x="795" y="158" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" fill="#fff">Gemini</text>
  <text x="795" y="180" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#dbeafe">Google</text>
  <text x="795" y="198" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#eff6ff">CLI · API</text>

  <!-- Local / Ollama -->
  <rect x="890" y="120" width="170" height="88" rx="14" fill="#0f766e" filter="url(#sh)"/>
  <text x="975" y="152" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff">Local LLM</text>
  <text x="975" y="174" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#ccfbf1">Ollama · open weights</text>
  <text x="975" y="194" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="10" fill="#99f6e4">auto via nexus start</text>

  <!-- arrows into bus -->
  <path d="M115 208 V250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>
  <path d="M285 208 V250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>
  <path d="M455 208 V250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>
  <path d="M625 208 V250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>
  <path d="M795 208 V250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>
  <path d="M975 208 V250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Bus + adapters -->
  <rect x="40" y="255" width="1020" height="70" rx="14" fill="#1e293b" filter="url(#sh)"/>
  <text x="550" y="285" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="15" font-weight="700" fill="#f8fafc">ATTACHMENT LAYER</text>
  <text x="550" y="308" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#cbd5e1">MCP (HTTPS / SSE / stdio)  ·  Event bus file-drop bridges  ·  OpenAI-compatible HTTP</text>

  <path d="M550 325 V355" stroke="#475569" stroke-width="2" marker-end="url(#a1)"/>

  <!-- NEXUS brain -->
  <rect x="200" y="360" width="700" height="130" rx="16" fill="#312e81" filter="url(#sh)"/>
  <text x="550" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#e0e7ff">NEXUS Core Orchestration</text>
  <text x="550" y="430" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#c7d2fe">Durable 10-step adversarial pipeline  ·  Rubric judge  ·  Cascade index  ·  Memory spine</text>
  <text x="550" y="458" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#a5b4fc">Autonomy default OFF  ·  Human approval gate  ·  Checkpoint / resume</text>

  <path d="M350 490 V520" stroke="#475569" stroke-width="2" marker-end="url(#a1)"/>
  <path d="M550 490 V520" stroke="#475569" stroke-width="2" marker-end="url(#a1)"/>
  <path d="M750 490 V520" stroke="#475569" stroke-width="2" marker-end="url(#a1)"/>

  <!-- pipeline roles -->
  <text x="40" y="545" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="0.08em" fill="#94a3b8">PIPELINE ROLES (MAPPED TO AGENTS)</text>

  <g font-family="ui-sans-serif,system-ui,sans-serif" font-size="11">
    <rect x="40" y="560" width="95" height="50" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <text x="87" y="582" text-anchor="middle" fill="#0f172a" font-weight="600">planner</text>
    <text x="87" y="598" text-anchor="middle" fill="#64748b">Claude / GPT</text>

    <rect x="150" y="560" width="95" height="50" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <text x="197" y="582" text-anchor="middle" fill="#0f172a" font-weight="600">adversary</text>
    <text x="197" y="598" text-anchor="middle" fill="#64748b">Grok / local</text>

    <rect x="260" y="560" width="95" height="50" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <text x="307" y="582" text-anchor="middle" fill="#0f172a" font-weight="600">implement</text>
    <text x="307" y="598" text-anchor="middle" fill="#64748b">Codex / GLM</text>

    <rect x="370" y="560" width="95" height="50" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <text x="417" y="582" text-anchor="middle" fill="#0f172a" font-weight="600">tester</text>
    <text x="417" y="598" text-anchor="middle" fill="#64748b">local / fast</text>

    <rect x="480" y="560" width="95" height="50" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <text x="527" y="582" text-anchor="middle" fill="#0f172a" font-weight="600">reviewer</text>
    <text x="527" y="598" text-anchor="middle" fill="#64748b">Claude</text>

    <rect x="590" y="560" width="95" height="50" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <text x="637" y="582" text-anchor="middle" fill="#0f172a" font-weight="600">meta</text>
    <text x="637" y="598" text-anchor="middle" fill="#64748b">panel</text>

    <rect x="700" y="560" width="95" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="747" y="582" text-anchor="middle" fill="#92400e" font-weight="600">approve</text>
    <text x="747" y="598" text-anchor="middle" fill="#b45309">human</text>

    <rect x="810" y="560" width="95" height="50" rx="8" fill="#fff" stroke="#e2e8f0"/>
    <text x="857" y="582" text-anchor="middle" fill="#0f172a" font-weight="600">deliver</text>
    <text x="857" y="598" text-anchor="middle" fill="#64748b">report</text>

    <rect x="920" y="560" width="140" height="50" rx="8" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="990" y="582" text-anchor="middle" fill="#5b21b6" font-weight="600">judge seat</text>
    <text x="990" y="598" text-anchor="middle" fill="#7c3aed">≠ implementer</text>
  </g>

  <!-- bottom note -->
  <rect x="40" y="640" width="1020" height="90" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="60" y="675" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="700" fill="#0f172a">Research-paper framing</text>
  <text x="60" y="700" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#475569">Heterogeneous vendors reduce correlated failure modes. Cross-vendor judging approximates independent review.</text>
  <text x="60" y="720" font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#475569">Local models (Ollama, GLM-5.2/colibrì) keep heavy inference on-prem; cloud CLIs provide subscription-backed planning and critique.</text>

  <text x="40" y="760" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8">Figure · Multi-agent panel · NEXUS Core · github.com/VincentMarquez/nexus-core</text>
</svg>
